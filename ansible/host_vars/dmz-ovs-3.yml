---
node_name: "DMZ-OVS-3"
node_type: "openvswitch"
switch_role: "dmz"

management:
  type: "oob"
  interface: "eth3"
  ip: "10.200.0.33/24"
  ansible_host: "10.200.0.33"

oob_management:
  interface: "eth3"
  ip: "10.200.0.33/24"

legacy_management:
  ip: "172.16.50.3/24"
  mac: "02:50:00:00:00:03"
  gateway: "172.16.50.1"
  path: "legacy-dmz-path"

security_policy:
  allowed_admin_source: "10.200.0.10"
  allowed_admin_protocols:
    - "tcp/22"
    - "icmp"
  denied_by_default:
    - "other_internal_to_dmz"
    - "dmz_to_internal"

bridge: "br0"

expected_ports:
  eth0: "dmz_web_server"
  eth1: "dmz_dns_server"
  eth2: "dmz_edge_router"
  eth3: "oob_management"
  mgmt0: "legacy_dmz_management_interface"

expected_checks:
  - bridge_exists
  - dmz_ports
  - oob_management_ip
  - legacy_dmz_management_ip
  - fdb_table
  - ssh_from_devops_oob_only
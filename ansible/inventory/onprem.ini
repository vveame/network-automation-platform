# Network infrastructure nodes
# SSH required

[ovs_access]
access-ovs-4 ansible_host=10.200.0.44
access-ovs-5 ansible_host=10.200.0.45
access-ovs-6 ansible_host=10.200.0.46

[ovs_distribution]
dist-ovs-1 ansible_host=10.200.0.31
dist-ovs-2 ansible_host=10.200.0.32

[ovs_dmz]
dmz-ovs-3 ansible_host=10.200.0.33

[ovs:children]
ovs_access
ovs_distribution
ovs_dmz

# FRRouting routers
# SSH required
# These IPs require management access to be configured on FRR.

[frr_core]
core-frr-1 ansible_host=10.200.0.11
core-frr-2 ansible_host=10.200.0.12

[frr_distribution]
dist-frr-1 ansible_host=10.200.0.21
dist-frr-2 ansible_host=10.200.0.22

[frr_edge]
edge-router ansible_host=10.200.0.30

[frr:children]
frr_core
frr_distribution
frr_edge

# DMZ service nodes
# Health checks required
# SSH is not required.
# These are validated from the DevOps server using HTTP/DNS.

[dmz_services]
web-server ansible_host=172.16.50.10 ansible_connection=local
dns-server ansible_host=172.16.50.20 ansible_connection=local

# Endpoint/test hosts
# SSH not required
# Connectivity tests required.
# VPCS are represented as topology endpoints.

[vpcs_vlan10]
pc1 ansible_host=192.168.10.11 ansible_connection=local
pc2 ansible_host=192.168.10.12 ansible_connection=local

[vpcs_vlan20]
pc3 ansible_host=192.168.20.13 ansible_connection=local

[vpcs:children]
vpcs_vlan10
vpcs_vlan20

# Logical topology groups

[network_infra:children]
ovs
frr

[service_nodes:children]
dmz_services

[endpoints:children]
vpcs

[onprem:children]
network_infra
service_nodes
endpoints

# SSH defaults for directly managed infrastructure

[network_infra:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ConnectTimeout=5'
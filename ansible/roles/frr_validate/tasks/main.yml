---
- name: Set FRR node validation data
  ansible.builtin.set_fact:
    frr_node_validation: "{{ frr_validation.nodes[inventory_hostname] }}"

- name: Show hostname
  ansible.builtin.raw: hostname
  register: frr_hostname
  changed_when: false

- name: Show IP configuration
  ansible.builtin.raw: "ip addr"
  register: frr_ip
  changed_when: false

- name: Validate FRR OOB interface address
  ansible.builtin.raw: "ip addr show {{ expected_frr_nodes[inventory_hostname].oob_interface }} | grep '{{ expected_frr_nodes[inventory_hostname].oob_ip }}'"
  register: frr_oob_check
  changed_when: false

- name: Validate FRR loopback address
  ansible.builtin.raw: "ip addr show lo | grep '{{ expected_frr_nodes[inventory_hostname].loopback_ip.split('/')[0] }}'"
  register: frr_loopback_check
  changed_when: false

- name: Show loopback configuration
  ansible.builtin.raw: "ip addr show lo"
  register: frr_loopback
  changed_when: false

- name: Show routing table
  ansible.builtin.raw: "ip route"
  register: frr_route
  changed_when: false

- name: Show OSPF neighbors
  ansible.builtin.raw: 'vtysh -c "show ip ospf neighbor"'
  register: frr_ospf_neighbors
  changed_when: false

- name: Count FULL OSPF neighbors
  ansible.builtin.set_fact:
    frr_ospf_full_count: "{{ frr_ospf_neighbors.stdout | regex_findall('Full') | length }}"

- name: Assert expected number of FULL OSPF neighbors
  ansible.builtin.assert:
    that:
      - frr_ospf_full_count | int >= frr_node_validation.expected_min_ospf_full_neighbors | int
    fail_msg: "{{ inventory_hostname }} has {{ frr_ospf_full_count }} FULL OSPF neighbors, expected at least {{ frr_node_validation.expected_min_ospf_full_neighbors }}."
    success_msg: "{{ inventory_hostname }} has expected FULL OSPF neighbor count."

- name: Show OSPF routes
  ansible.builtin.raw: 'vtysh -c "show ip route ospf"'
  register: frr_ospf_routes
  changed_when: false
  failed_when: false

- name: Show route to FRR loopback prefix
  ansible.builtin.raw: 'vtysh -c "show ip route 10.255.0.0/24"'
  register: frr_mgmt_route
  changed_when: false
  failed_when: false

- name: Show VRRP state
  ansible.builtin.raw: 'vtysh -c "show vrrp"'
  register: frr_vrrp
  changed_when: false
  failed_when: false

- name: Assert expected VRRP virtual gateways are present
  ansible.builtin.assert:
    that:
      - item in frr_vrrp.stdout
    fail_msg: "Expected VRRP gateway {{ item }} not found on {{ inventory_hostname }}."
    success_msg: "Expected VRRP gateway {{ item }} found on {{ inventory_hostname }}."
  loop: "{{ frr_node_validation.expected_vrrp_gateways }}"
  when: frr_node_validation.expected_vrrp_gateways | length > 0

- name: Show INPUT firewall rules
  ansible.builtin.raw: "iptables -L INPUT -v -n --line-numbers"
  register: frr_input_rules
  changed_when: false
  failed_when: false

- name: Show FORWARD firewall rules
  ansible.builtin.raw: "iptables -L FORWARD -v -n --line-numbers"
  register: frr_forward_rules
  changed_when: false
  failed_when: false

- name: Show NAT rules
  ansible.builtin.raw: "iptables -t nat -L -v -n --line-numbers"
  register: frr_nat_rules
  changed_when: false
  failed_when: false

- name: Save FRR validation output locally
  ansible.builtin.copy:
    dest: "../outputs/{{ inventory_hostname }}-frr.txt"
    content: |
      HOST: {{ inventory_hostname }}

      === HOSTNAME ===
      {{ frr_hostname.stdout }}

      === OOB CHECK ===
      {{ frr_oob_check.stdout }}

      === LOOPBACK CHECK ===
      {{ frr_loopback_check.stdout }}

      === FULL OSPF NEIGHBOR COUNT ===
      expected_min={{ frr_node_validation.expected_min_ospf_full_neighbors }}
      actual={{ frr_ospf_full_count }}

      === IP CONFIGURATION ===
      {{ frr_ip.stdout }}

      === LOOPBACK CONFIGURATION ===
      {{ frr_loopback.stdout }}

      === ROUTING TABLE ===
      {{ frr_route.stdout }}

      === OSPF NEIGHBORS ===
      {{ frr_ospf_neighbors.stdout | default('N/A') }}

      === OSPF ROUTES ===
      {{ frr_ospf_routes.stdout | default('N/A') }}

      === LOOPBACK PREFIX ROUTE ===
      {{ frr_mgmt_route.stdout | default('N/A') }}

      === VRRP ===
      {{ frr_vrrp.stdout | default('N/A') }}

      === INPUT RULES ===
      {{ frr_input_rules.stdout | default('N/A') }}

      === FORWARD RULES ===
      {{ frr_forward_rules.stdout | default('N/A') }}

      === NAT RULES ===
      {{ frr_nat_rules.stdout | default('N/A') }}
  delegate_to: localhost
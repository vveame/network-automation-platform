---
- name: Verify Ansible raw SSH connection to infrastructure nodes
  hosts: network_infra
  gather_facts: false

  tasks:
    - name: Verify raw SSH command works
      ansible.builtin.raw: "hostname"
      register: raw_ssh_test
      changed_when: false

    - name: Show raw SSH result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} reachable through Ansible raw SSH as {{ raw_ssh_test.stdout | trim }}"
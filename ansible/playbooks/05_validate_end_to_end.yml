---
- name: Validate end-to-end topology connectivity
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gateway_targets:
      - "192.168.10.1"
      - "192.168.20.1"
      - "192.168.99.1"

    oob_management_tests:
      - name: "core-frr-1-oob-ssh"
        command: "nc -zv -w 3 10.200.0.11 22"
      - name: "core-frr-2-oob-ssh"
        command: "nc -zv -w 3 10.200.0.12 22"
      - name: "dist-frr-1-oob-ssh"
        command: "nc -zv -w 3 10.200.0.21 22"
      - name: "dist-frr-2-oob-ssh"
        command: "nc -zv -w 3 10.200.0.22 22"
      - name: "edge-router-oob-ssh"
        command: "nc -zv -w 3 10.200.0.30 22"
      - name: "dist-ovs-1-oob-ssh"
        command: "nc -zv -w 3 10.200.0.31 22"
      - name: "dist-ovs-2-oob-ssh"
        command: "nc -zv -w 3 10.200.0.32 22"
      - name: "dmz-ovs-3-oob-ssh"
        command: "nc -zv -w 3 10.200.0.33 22"
      - name: "access-ovs-4-oob-ssh"
        command: "nc -zv -w 3 10.200.0.44 22"
      - name: "access-ovs-5-oob-ssh"
        command: "nc -zv -w 3 10.200.0.45 22"
      - name: "access-ovs-6-oob-ssh"
        command: "nc -zv -w 3 10.200.0.46 22"

    frr_loopback_tests:
      - name: "core-frr-1-loopback"
        command: "ping -c 2 -W 2 10.255.0.11"
      - name: "core-frr-2-loopback"
        command: "ping -c 2 -W 2 10.255.0.12"
      - name: "dist-frr-1-loopback"
        command: "ping -c 2 -W 2 10.255.0.21"
      - name: "dist-frr-2-loopback"
        command: "ping -c 2 -W 2 10.255.0.22"
      - name: "edge-router-loopback"
        command: "ping -c 2 -W 2 10.255.0.30"

    dmz_allowed_tests:
      - name: "web-http"
        command: "curl -s --connect-timeout 5 http://172.16.50.10"
      - name: "dns-query"
        command: "nslookup web.pfe.local 172.16.50.20"

  tasks:
    - name: Ensure outputs directory exists
      ansible.builtin.file:
        path: "../outputs"
        state: directory
        mode: "0755"

    - name: Ping VLAN gateways
      ansible.builtin.command: "ping -c 2 -W 2 {{ item }}"
      loop: "{{ gateway_targets }}"
      changed_when: false
      register: gateway_ping
      failed_when: false

    - name: Run OOB management SSH tests
      ansible.builtin.command: "{{ item.command }}"
      loop: "{{ oob_management_tests }}"
      changed_when: false
      register: oob_mgmt
      failed_when: false

    - name: Run FRR loopback validation tests
      ansible.builtin.command: "{{ item.command }}"
      loop: "{{ frr_loopback_tests }}"
      changed_when: false
      register: frr_loopbacks
      failed_when: false

    - name: Run allowed DMZ service tests
      ansible.builtin.command: "{{ item.command }}"
      loop: "{{ dmz_allowed_tests }}"
      changed_when: false
      register: dmz_allowed
      failed_when: false

    - name: Save end-to-end validation output
      ansible.builtin.copy:
        dest: "../outputs/end-to-end-validation.txt"
        content: |
          === VLAN GATEWAY TESTS ===
          {% for result in gateway_ping.results %}
          TARGET: {{ result.item }}
          RC: {{ result.rc }}
          {{ result.stdout }}

          --------------------------------------------------
          {% endfor %}

          === OOB MANAGEMENT SSH TESTS ===
          {% for result in oob_mgmt.results %}
          TEST: {{ result.item.name }}
          COMMAND: {{ result.item.command }}
          RC: {{ result.rc }}
          STDOUT:
          {{ result.stdout }}

          STDERR:
          {{ result.stderr }}
          --------------------------------------------------
          {% endfor %}

          === FRR LOOPBACK VALIDATION TESTS ===
          {% for result in frr_loopbacks.results %}
          TEST: {{ result.item.name }}
          COMMAND: {{ result.item.command }}
          RC: {{ result.rc }}
          STDOUT:
          {{ result.stdout }}

          STDERR:
          {{ result.stderr }}
          --------------------------------------------------
          {% endfor %}

          === DMZ ALLOWED SERVICE TESTS ===
          {% for result in dmz_allowed.results %}
          TEST: {{ result.item.name }}
          COMMAND: {{ result.item.command }}
          RC: {{ result.rc }}
          STDOUT:
          {{ result.stdout }}

          STDERR:
          {{ result.stderr }}
          --------------------------------------------------
          {% endfor %}
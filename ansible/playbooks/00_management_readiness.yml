---
- name: Verify OOB management-plane readiness
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Ensure outputs directory exists
      ansible.builtin.file:
        path: "../outputs"
        state: directory
        mode: "0755"

    - name: Ping OOB management targets
      ansible.builtin.command: "ping -c 2 -W 2 {{ item.ip }}"
      loop: "{{ oob_management.targets }}"
      changed_when: false
      register: oob_ping

    - name: Wait for SSH port on OOB management targets
      ansible.builtin.wait_for:
        host: "{{ item.ip }}"
        port: 22
        state: started
        delay: 1
        timeout: 10
        connect_timeout: 3
      loop: "{{ oob_management.targets }}"
      register: oob_ssh_wait

    - name: Save OOB management readiness output
      ansible.builtin.copy:
        dest: "../outputs/oob-management-readiness.txt"
        content: |
          === OOB MANAGEMENT READINESS ===

          DevOps OOB IP:
            {{ oob_management.devops_ip }}

          OOB network:
            {{ oob_management.network }}

          === ICMP CHECKS ===
          {% for result in oob_ping.results %}
          TARGET: {{ result.item.name }} - {{ result.item.ip }}
          RC: {{ result.rc }}
          STDOUT:
          {{ result.stdout }}

          STDERR:
          {{ result.stderr }}
          --------------------------------------------------
          {% endfor %}

          === SSH PORT CHECKS ===
          {% for result in oob_ssh_wait.results %}
          TARGET: {{ result.item.name }} - {{ result.item.ip }}:22
          FAILED: {{ result.failed | default(false) }}
          ELAPSED: {{ result.elapsed | default('N/A') }}
          MSG: {{ result.msg | default('OK') }}
          --------------------------------------------------
          {% endfor %}
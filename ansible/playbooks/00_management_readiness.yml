---
- name: Verify management-plane readiness after node-side announce
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ssh_targets:
      # OVS internal management
      - name: "dist-ovs-1"
        ip: "192.168.99.31"
      - name: "dist-ovs-2"
        ip: "192.168.99.32"
      - name: "access-ovs-4"
        ip: "192.168.99.44"
      - name: "access-ovs-5"
        ip: "192.168.99.45"
      - name: "access-ovs-6"
        ip: "192.168.99.46"

      # DMZ OVS through EdgeRouter
      - name: "dmz-ovs-3"
        ip: "172.16.50.3"

      # FRR routed loopback management
      - name: "core-frr-1"
        ip: "10.255.0.11"
      - name: "core-frr-2"
        ip: "10.255.0.12"
      - name: "dist-frr-1"
        ip: "10.255.0.21"
      - name: "dist-frr-2"
        ip: "10.255.0.22"
      - name: "edge-router"
        ip: "10.255.0.30"

  tasks:
    - name: Warm up management targets with ICMP
      ansible.builtin.command: "ping -c 2 -W 2 {{ item.ip }}"
      loop: "{{ ssh_targets }}"
      changed_when: false
      failed_when: false
      register: warmup_ping

    - name: Wait for SSH port to open
      ansible.builtin.wait_for:
        host: "{{ item.ip }}"
        port: 22
        state: started
        delay: 1
        timeout: 30
        connect_timeout: 3
      loop: "{{ ssh_targets }}"
      register: ssh_wait
      failed_when: false

    - name: Save management readiness output
      ansible.builtin.copy:
        dest: "../outputs/management-readiness.txt"
        content: |
          === ICMP WARM-UP ===
          {% for result in warmup_ping.results %}
          TARGET: {{ result.item.name }} - {{ result.item.ip }}
          RC: {{ result.rc }}
          STDOUT:
          {{ result.stdout }}

          STDERR:
          {{ result.stderr }}
          --------------------------------------------------
          {% endfor %}

          === SSH PORT READINESS ===
          {% for result in ssh_wait.results %}
          TARGET: {{ result.item.name }} - {{ result.item.ip }}:22
          FAILED: {{ result.failed | default(false) }}
          ELAPSED: {{ result.elapsed | default('N/A') }}
          MSG: {{ result.msg | default('OK') }}
          --------------------------------------------------
          {% endfor %}
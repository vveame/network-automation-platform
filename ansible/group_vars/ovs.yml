    mgmt_mac: "02:99:00:00:00:45"

  access-ovs-6:
    mgmt_ip: "192.168.99.46"
    mgmt_mac: "02:99:00:00:00:46"

  dist-ovs-1:
    mgmt_ip: "192.168.99.31"
    mgmt_mac: "02:99:00:00:00:31"


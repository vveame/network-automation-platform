---
node_family: "frr-router"
access_method: "ssh"
python_required: false
ansible_module_preference: "raw"

frr_management:
  type: "oob"
  prefix: "10.200.0.0/24"
  ssh_source_allowed: "10.200.0.10"

frr_loopbacks:
  description: "Loopbacks are used for OSPF/routing validation, not as the primary SSH control path."
  prefix: "10.255.0.0/24"
  routing_protocol: "ospf"

expected_frr_nodes:
  core-frr-1:
    oob_ip: "10.200.0.11"
    oob_interface: "eth3"
    loopback_ip: "10.255.0.11/32"

  core-frr-2:
    oob_ip: "10.200.0.12"
    oob_interface: "eth3"
    loopback_ip: "10.255.0.12/32"

  dist-frr-1:
    oob_ip: "10.200.0.21"
    oob_interface: "eth3"
    loopback_ip: "10.255.0.21/32"

  dist-frr-2:
    oob_ip: "10.200.0.22"
    oob_interface: "eth3"
    loopback_ip: "10.255.0.22/32"

  edge-router:
    oob_ip: "10.200.0.30"
    oob_interface: "eth4"
    loopback_ip: "10.255.0.30/32"

frr_expected_daemons:
  - zebra
  - ospfd
  - staticd
  - vrrpd

frr_common_validation_commands:
  - 'hostname'
  - 'ip addr'
  - 'ip route'
  - 'vtysh -c "show running-config"'
  - 'vtysh -c "show ip route"'

frr_ospf_validation_commands:
  - 'vtysh -c "show ip ospf neighbor"'
  - 'vtysh -c "show ip route ospf"'

frr_loopback_validation_commands:
  - 'ip addr show lo'
  - 'vtysh -c "show ip route 10.255.0.0/24"'

frr_security_validation_commands:
  - 'iptables -L INPUT -v -n --line-numbers'
  - 'iptables -L FORWARD -v -n --line-numbers'
  - 'iptables -t nat -L -v -n --line-numbers'

expected_ospf_state: "Full"

frr_validation:
  nodes:
    core-frr-1:
      expected_min_ospf_full_neighbors: 3
      expected_vrrp_gateways: []

    core-frr-2:
      expected_min_ospf_full_neighbors: 3
      expected_vrrp_gateways: []

    dist-frr-1:
      expected_min_ospf_full_neighbors: 2
      expected_vrrp_gateways:
        - "192.168.10.1"
        - "192.168.20.1"
        - "192.168.99.1"

    dist-frr-2:
      expected_min_ospf_full_neighbors: 2
      expected_vrrp_gateways:
        - "192.168.10.1"
        - "192.168.20.1"
        - "192.168.99.1"

    edge-router:
      expected_min_ospf_full_neighbors: 2
      expected_vrrp_gateways: []
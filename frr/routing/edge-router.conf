frr version 8.4_git
frr defaults traditional
hostname EdgeRouter-VPNGateway
no ipv6 forwarding
!
interface eth2
 ip ospf passive
exit
!
!
! Lab internet underlay for EC2 WireGuard tunnel.
! EdgeRouter-VPNGateway uses DevOps OOB 10.200.0.10 as the next hop
! to reach the AWS EC2 tunnel gateway public endpoint.
! DevOps provides NAT underlay only; it is not the cloud gateway.
ip route 0.0.0.0/0 10.200.0.10
!
router ospf
 ospf router-id 3.3.3.3
 network 10.0.100.0/30 area 0
 network 10.0.101.0/30 area 0
 network 172.16.50.0/24 area 0
 network 10.255.0.30/32 area 0
 default-information originate
exit
!
end
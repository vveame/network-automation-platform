global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "network-automation-platform"
    environment: "gns3-onprem-lab"
    monitoring_layer: "local-prometheus-baseline"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          role: "prometheus-server"
          source: "local-devops"

  - job_name: "node-exporter"
    file_sd_configs:
      - files:
          - "/etc/prometheus/targets/node-targets.yml"
        refresh_interval: 30s

modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: "ip4"
      valid_http_versions:
        - "HTTP/1.1"
        - "HTTP/2.0"
      valid_status_codes: []

  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: "ip4"

  dns_web_pfe_local:
    prober: dns
    timeout: 5s
    dns:
      query_name: "web.pfe.local"
      query_type: "A"
      preferred_ip_protocol: "ip4"
